# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    allow_tearing = true
    # No gaps between windows or borders
    # gaps_in = 0
    # gaps_out = 0
    # border_size = 0
    # Use master layout instead of dwindle
    # layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    rounding = 4
}

# https://wiki.hyprland.org/Configuring/Dwindle-Layout/

# Single window: add side padding (~90% width on 1920px = 96px each side)
workspace = w[tv1], gapsout:10 96 10 96

misc {
    vrr = 1
    vfr = true{}
    mouse_move_enables_dpms = true
}

cursor {
    no_hardware_cursors = true
    enable_hyprcursor = true
}

# Notification: no animation (dunst uses overlay layer)
layerrule = no_anim on, match:namespace notifications

# Border color (Kanagawa foreground — warm white)
$activeBorderColor = rgb(dcd7ba)
general {
    col.active_border = $activeBorderColor
}

group {
    col.border_active = $activeBorderColor
}

# Window opacity
windowrule = opacity 0.8 0.7
windowrule = opacity 0.90 0.85, match:tag terminal

# --- Named workspace assignments ---
# Chat: WhatsApp, Slack, Discord
windowrule = workspace name:chat, match:class ^(Slack|slack)$
windowrule = workspace name:chat, match:class ^(chrome|thorium)-web.whatsapp.com__-Default$
windowrule = workspace name:chat, match:class ^(chrome|thorium)-discord.com__app-Default$

# Mail: Gmail
windowrule = workspace name:mail, match:class ^(chrome|thorium)-mail.google.com__-Default$

# Dev: GitHub, Graphite
windowrule = workspace name:dev, match:class ^(chrome|thorium)-github.com__-Default$
windowrule = workspace name:dev, match:class ^(chrome|thorium)-app.graphite.dev__-Default$

# Media: Spotify, YouTube
windowrule = workspace name:media, match:class ^(Spotify|spotify)$
windowrule = workspace name:media, match:class ^(chrome|thorium)-youtube.com__-Default$

# Hyprfocus
plugin {
    hyprfocus {
        enabled = yes
        animate_floating = yes
        animate_workspacechange = yes
        focus_animation = flash

        bezier = bezIn, 0.5, 0.0, 1.0, 0.5
        bezier = bezOut, 0.0, 0.5, 0.5, 1.0
        bezier = overshot, 0.05, 0.9, 0.1, 1.05
        bezier = smoothOut, 0.36, 0, 0.66, -0.56
        bezier = smoothIn, 0.25, 1, 0.5, 1
        bezier = realsmooth, 0.28, 0.29, 0.69, 1.08
        bezier = easeInOutBack, 0.68, -0.6, 0.32, 1.6

        flash {
            flash_opacity = 0.9
            in_bezier = bezIn
            in_speed = 1
            out_bezier = bezOut
            out_speed = 1
        }

        shrink {
            shrink_percentage = 0.9
            in_bezier = easeInOutBack
            in_speed = 1.5
            out_bezier = easeInOutBack
            out_speed = 3
        }
    }

    # HyprExpo — workspace overview (3-finger swipe up)
    hyprexpo {
        columns = 2
        gap_size = 5
        bg_col = rgb(090E13)  # $background from colors.toml
        workspace_method = center current
        gesture_distance = 300
        skip_empty = false
    }
}
