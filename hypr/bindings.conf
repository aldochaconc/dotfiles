# Application bindings
$terminal = uwsm-app -- kitty
$browser = uwsm-app -- thorium-browser

# --- Control Overrides --

### --- Fullscreen ---
unbind = SUPER, F
unbind = SUPER CTRL, F
unbind = SUPER ALT, F

bindd = SUPER ALT, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER, F, Full width, fullscreen, 1

# --- VIM based control ---
unbind = SUPER, H
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, L

bindd = SUPER, H, Move window focus left, movefocus, l
bindd = SUPER, L, Move window focus right, movefocus, r
bindd = SUPER, K, Move window focus up, movefocus, u
bindd = SUPER, J, Move window focus down, movefocus, d


# --- System ---
bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
# --- Launchers ---
# Unbind Walker from SUPER+SPACE (Omarchy default) — Walker stays installed but unbound
unbind = SUPER, SPACE

bindd = SUPER, SEMICOLON, Run command, exec, rofi -show run -theme dmenu-crystal
bindd = SUPER SHIFT, SEMICOLON, Launch app, exec, rofi -show drun -show-icons -theme dmenu-crystal

# --- Desktop ---
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify-launcher
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor

# --- Media ---
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"

# --- Browser ---
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private

# --- Communication ---
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-or-focus-webapp Calendar "https://calendar.google.com/calendar/u/0/r"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-or-focus-webapp Email "https://gmail.com"
bindd = SUPER SHIFT, W, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"

# --- Tools ---
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT, S, Slack, exec, omarchy-launch-or-focus slack

# --- Work ---
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Github, exec, omarchy-launch-or-focus-webapp Github "https://github.com"
bindd = SUPER SHIFT, H, Graphite, exec, omarchy-launch-or-focus-webapp Graphite "https://graphite.dev"
bindd = SUPER SHIFT CTRL, N, Cursor, exec, uwsm-app -- cursor --disable-gpu --disable-gpu-compositing

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment

