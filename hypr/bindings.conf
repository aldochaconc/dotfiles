# Application bindings
$terminal = uwsm-app -- kitty
$browser = uwsm-app -- thorium-browser

# --- Control Overrides --

### --- Fullscreen ---
unbind = SUPER, F
unbind = SUPER CTRL, F
unbind = SUPER ALT, F

bindd = SUPER ALT, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER CTRL, F, Full screen, fullscreen, 0
bindd = SUPER, F, Full width, fullscreen, 1

# --- VIM based control ---
unbind = SUPER, H
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, L

bindd = SUPER, H, Move window focus left, movefocus, l
bindd = SUPER, L, Move window focus right, movefocus, r
bindd = SUPER, K, Move window focus up, movefocus, u
bindd = SUPER, J, Move window focus down, movefocus, d


# --- System ---
bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
# --- Launchers ---
# Unbind Walker from SUPER+SPACE (Omarchy default) — use for hyprexpo overview
unbind = SUPER, SPACE
bindd = SUPER, SPACE, Workspace overview, hyprexpo:expo, toggle

bindd = SUPER, SEMICOLON, Launch app, exec, rofi -show drun -show-icons -theme dmenu-crystal
bindd = SUPER SHIFT, SEMICOLON, Run command, exec, rofi -show run -theme dmenu-crystal

# --- Desktop ---
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor

# --- Browser ---
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --incognito

# --- Communication (workspace: chat) ---
bindd = SUPER SHIFT, W, WhatsApp, exec, hyprctl dispatch workspace name:chat && omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT, S, Slack, exec, hyprctl dispatch workspace name:chat && omarchy-launch-or-focus slack
bindd = SUPER SHIFT, D, Discord, exec, hyprctl dispatch workspace name:chat && omarchy-launch-or-focus-webapp Discord "https://discord.com/app"

# --- Media (workspace: media) ---
bindd = SUPER SHIFT, M, Music, exec, hyprctl dispatch workspace name:media && omarchy-launch-or-focus spotify-launcher
bindd = SUPER SHIFT, Y, YouTube, exec, hyprctl dispatch workspace name:media && omarchy-launch-webapp "https://youtube.com/"

# --- Tools ---
bindd = SUPER SHIFT, A, Claude, exec, omarchy-launch-or-focus claude-desktop
bindd = SUPER SHIFT, E, Email, exec, hyprctl dispatch workspace name:mail && omarchy-launch-or-focus-webapp Email "https://mail.google.com"
# --- Work ---
bindd = SUPER SHIFT, C, Cursor, exec, uwsm-app -- cursor --disable-gpu --disable-gpu-compositing
bindd = SUPER SHIFT, G, Github, exec, hyprctl dispatch workspace name:dev && omarchy-launch-or-focus-webapp Github "https://github.com"
bindd = SUPER SHIFT, H, Graphite, exec, hyprctl dispatch workspace name:dev && omarchy-launch-or-focus-webapp Graphite "https://app.graphite.dev"

# --- System TUIs ---
bindd = SUPER SHIFT, I, WiFi, exec, omarchy-launch-wifi
bindd = SUPER SHIFT, O, Audio, exec, omarchy-launch-tui wiremix
bindd = SUPER SHIFT, P, Bluetooth, exec, omarchy-launch-tui bluetui

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment

