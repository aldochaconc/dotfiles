[colors]
; Nightfox inspired dark theme (approximated)
background = #000000
top-background = #4D000000
bottom-background =#00000000
background-alt = #212E3E
foreground = #CDD3E0
foreground-alt = #A6B0C9
primary = #82AAFF
secondary = #C3A2EA
accent = #FFAB70
alert = #FF757F
disabled = #546E7A

[settings/bar-defaults]
width = 100%
height = 25
radius = 0

foreground = ${colors.foreground}

line-size = 2pt
border-size = 0pt
border-color = #00000000

padding-left = 1
padding-right = 3
module-margin = 2

font-0 = "Hack:size=10;2"
font-1 = "Font Awesome 6 Free Solid:style=Solid:size=10;2"

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[settings]
screenchange-reload = true 