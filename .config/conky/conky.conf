conky.config = {
    -- Window settings
    alignment = 'right',
    background = false,
    border_width = 1,
    cpu_avg_samples = 16,
    default_color = 'white',
    default_outline_color = 'white',
    default_shade_color = 'white',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'Hack:size=9',
    gap_x = 20,
    gap_y = -280,
    minimum_height = 480,
    minimum_width = 240,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'override',
    own_window_transparent = false,
    own_window_colour = '000000',
    own_window_argb_visual = true,
    own_window_argb_value = 128,
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
};

conky.text = [[
${color grey}SYSTEM ${hr 2}
${color grey}Hostname:$color $nodename
${color grey}Kernel:$color $kernel
${color grey}Uptime:$color $uptime

${color grey}STATUS ${hr 2}
${color grey}CPU:$color ${cpu cpu0}% ${cpubar cpu0}
${color grey}RAM:$color $mem/$memmax - $memperc% ${membar}
${color grey}Swap:$color $swap/$swapmax - $swapperc% ${swapbar}

${color grey}NETWORK ${hr 2}
${color grey}Local IP:$color ${addr wlo1}
${color grey}Download:$color ${downspeed wlo1} ${color grey}Upload:$color ${upspeed wlo1}
${downspeedgraph wlo1 25,120 000000 00ff00} ${upspeedgraph wlo1 25,120 000000 ff0000}

${color grey}FILE SYSTEMS ${hr 2}
${color grey}Root:$color ${fs_used /}/${fs_size /} ${fs_bar /}
${color grey}Home:$color ${fs_used /home}/${fs_size /home} ${fs_bar /home}

${color grey}MONITOR ${hr 2}
${color grey}Processes:$color $processes  
${color grey}Running:$color $running_processes
${color grey}Name${offset 135}CPU${offset 70}RAM
${color}${top name 1}${offset 40}${top cpu 1}%${offset 40}${top_mem mem 1}%
${color}${top name 2}${offset 40}${top cpu 2}%${offset 40}${top_mem mem 2}%
${color}${top name 3}${offset 40}${top cpu 3}%${offset 40}${top_mem mem 3}%
${color}${top name 4}${offset 40}${top cpu 4}%${offset 40}${top_mem mem 4}%
${color}${top name 5}${offset 40}${top cpu 5}%${offset 40}${top_mem mem 5}%
${color}${top name 6}${offset 40}${top cpu 6}%${offset 40}${top_mem mem 6}%

]]; 