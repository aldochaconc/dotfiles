# picom configuration file
# Based on common recommendations and sample configurations.

#################################
#           Backends            #
#################################

backend = "glx";
vsync = true;
glx-copy-from-front = false;
# The 'buffer-age' swap method can sometimes cause issues.
# Let's try the default 'undefined' method first.
glx-swap-method = "undefined";
unredir-if-possible = true;

# Using damage tracking can improve performance by only redrawing changed parts of the screen.
# This can also help with the "Page flip failed" errors.
use-damage = true;


#################################
#           Shadows             #
#################################

shadow = false;
shadow-radius = 12; # Gist had 35, let's start more moderate.
shadow-opacity = 0.75;
shadow-offset-x = -12; # Gist had -35
shadow-offset-y = -12; # Gist had -35
shadow-ignore-shaped = true; # Ignore shadows on shaped windows (CSD)

# Color of shadow, default is black.
# shadow-red = 0.0;
# shadow-green = 0.0;
# shadow-blue = 0.0;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'slop'", # Avoid shadow on selection tools like slop
  "class_g = 'Firefox' && argb", # Exclude shadows on Firefox with ARGB windows (like some popups)
  "class_g = 'Rofi'",
  "_GTK_FRAME_EXTENTS",
  "class_g = 'Nautilus'", # Disable shadows for Nautilus
  "class_g ~= 'xdg-desktop-portal' && _NET_FRAME_EXTENTS@:c && window_type = 'dialog'",
  "class_g ~= 'xdg-desktop-portal' && window_type = 'menu'",
  "_NET_FRAME_EXTENTS@:c && WM_WINDOW_ROLE@:s = 'Popup'",
  "override_redirect = true"
];
# Exclude shadows on windows with a custom WM_CLASS, e.g. Dmenu.
# shadow-exclude-reg = "x10+0+0"; # Example for a specific geometry

#################################
#           Fading              #
#################################

fading = false;
fade-delta = 4; # Fade time in milliseconds (e.g., 4-10)
fade-in-step = 0.02; # Opacity change per step while fading in.
fade-out-step = 0.022; # Opacity change per step while fading out.
no-fading-openclose = true; # Disable fading for window open/close operations.
#################################
#   Opacity/Transparency        #
#################################

# Opacity of inactive windows. (0.0 - 1.0)
# active-opacity = 0.97; # Slightly transparent active windows
# inactive-opacity = 0.95; # Slightly transparent inactive windows
# Opacity of window titlebars and borders.
frame-opacity = 0.9;
inactive-opacity-override = true;

opacity-rule = [
  "85:class_g = 'Dunst'", 
  "100:class_g = 'Chromium'",
  "100:class_g = 'Polybar'", 
  # "85:_NET_WM_WINDOW_TYPE = '_NET_WM_WINDOW_TYPE_NOTIFICATION'" # And for notification types (REMOVED FOR SIMPLIFICATION)
];


# Dim inactive windows. (0.0 - 1.0, defaults to 0.0)
# inactive-dim = 0.2;

#################################
#           Blur                #
#################################

# Blur background of transparent windows. Bad performance with X Render backend.
blur-background = false;

#################################
#           Other               #
#################################

# Try to detect WM windows (such as DWM status bar) and mark them as active.
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
detect-rounded-corners = true;
detect-client-opacity = true;


# Daemonize process. Fork to background after initialization.
# We use -b in the i3 exec line instead.
# daemon = false;

# Log level: "trace", "debug", "info", "warn", "error". (Default: "warn")
log-level = "warn";
# log-file = "/path/to/your/log/file"; # Specify if you want to log to a file

#################################
#       Window types            #
#      (wintypes section)       #
#################################
# Opacity rules for specific window types. `opacity` is a float between 0.0 and 1.0.
# `focus` is a boolean, true if the window is focused.
# `full_shadow` is a boolean, true if the window has a full shadow.
# `shadow` is a boolean, true if the window has a shadow.
# `fade` is a boolean, true if the window has fading.
# `blur-background` is a boolean, true if the window has background blur.

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.85; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; shadow = false; };
  dropdown_menu = { opacity = 0.95; shadow = false; };
  utility = { focus = true; shadow = false; opacity = 0.9; };
  dialog = { shadow = false; opacity = 0.95; };
  notification = { shadow = false; opacity = 0.85; blur-background = false; };
};

# Specify a list of applications that should not be composited.
